<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07111d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>賽博牌局修改器</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/app-icon-home-180.png?v=20260714" />
    <link rel="stylesheet" href="styles.css?v=iphone-offline-20260714" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">CC</span>
          <div>
            <h1>賽博牌局修改器</h1>
            <p>調整規則、卡牌數值與節奏</p>
          </div>
        </div>
        <nav class="view-tabs site-nav" aria-label="網站導覽">
          <a class="tab-link" href="index.html?view=builder">配牌</a>
          <a class="tab-link" href="index.html?view=game">對戰</a>
          <a class="tab-link" href="story.html">劇情</a>
          <a class="tab-link active" href="modifier.html">修改器</a>
          <a class="tab-link" href="guide.html">攻略</a>
        </nav>
      </header>

      <section class="page-layout">
        <div class="section-band">
          <h2>規則設定</h2>
          <p>設定會儲存在這台裝置的瀏覽器裡。儲存後回到遊戲頁重新開局，就會套用新的規則。</p>
          <div id="ruleEditor" class="rule-editor"></div>
          <div class="button-row">
            <button id="saveRulesBtn" class="primary-button">儲存設定</button>
            <button id="resetModsBtn" class="ghost-button">重置全部</button>
          </div>
          <div id="modifierStatus" class="status-line"></div>
        </div>

        <div class="page-grid">
          <section class="section-band">
            <div class="modifier-toolbar">
              <div>
                <h2>新增自製卡</h2>
                <p>自製卡會存在這台裝置的瀏覽器裡，可用匯出 JSON 分享給朋友。</p>
              </div>
              <div id="customPreview" class="editor-art custom-preview" aria-hidden="true"></div>
            </div>
            <div class="custom-card-form">
              <div class="field">
                <label for="customName">卡名</label>
                <input id="customName" maxlength="24" placeholder="輸入自製卡名" />
              </div>
              <div class="field">
                <label for="customType">類型</label>
                <select id="customType">
                  <option value="unit">單位</option>
                  <option value="program">程式</option>
                  <option value="mod">改造</option>
                  <option value="luxury">奢侈品</option>
                </select>
              </div>
              <div class="field">
                <label for="customFaction">陣營</label>
                <select id="customFaction">
                  <option value="neutral">中立</option>
                  <option value="merc">街頭</option>
                  <option value="hacker">駭客</option>
                  <option value="corp">企業</option>
                </select>
              </div>
              <div class="field">
                <label for="customCost">費用</label>
                <input id="customCost" type="number" min="0" max="12" value="1" />
              </div>
              <div class="field">
                <label for="customAttack">攻擊</label>
                <input id="customAttack" type="number" min="0" max="12" value="1" />
              </div>
              <div class="field">
                <label for="customHealth">生命</label>
                <input id="customHealth" type="number" min="1" max="20" value="1" />
              </div>
              <div class="field">
                <label for="customEffect">效果</label>
                <select id="customEffect">
                  <option value="">無額外效果</option>
                  <option value="draw_1">抽 1 張牌</option>
                  <option value="draw_2">抽 2 張牌</option>
                  <option value="heal_hero_2">回復 2 生命</option>
                  <option value="gain_shield_1">獲得 1 護盾</option>
                  <option value="deal_2">造成 2 傷害</option>
                  <option value="deal_3">造成 3 傷害</option>
                  <option value="summon_1_1_guard">召喚 1/1 守衛</option>
                  <option value="buff_1_1_ready">友方單位 +1/+1 並準備</option>
                </select>
              </div>
              <div class="field">
                <label for="customTarget">目標</label>
                <select id="customTarget">
                  <option value="">不指定</option>
                  <option value="enemy">敵方或敵方單位</option>
                  <option value="enemyUnit">敵方單位</option>
                  <option value="friendlyUnit">友方單位</option>
                </select>
              </div>
              <div class="field">
                <label for="customCashText">奢侈品程式模式說明</label>
                <input id="customCashText" maxlength="80" placeholder="預設：抽 1 張牌。" />
              </div>
              <label class="toggle-field">
                <input id="customGuard" type="checkbox" />
                <span>守衛</span>
              </label>
              <label class="toggle-field">
                <input id="customCharge" type="checkbox" />
                <span>快攻</span>
              </label>
              <div class="field custom-text-field">
                <label for="customText">卡牌文字</label>
                <textarea id="customText" maxlength="180" placeholder="輸入卡牌說明"></textarea>
              </div>
              <div class="art-tools custom-art-tools">
                <input id="customImage" class="file-input" type="file" accept="image/*" />
                <input id="customImageData" type="hidden" />
                <input id="customEditingId" type="hidden" />
                <label class="ghost-button compact-button" for="customImage">上傳圖片</label>
                <button id="clearCustomImageBtn" class="ghost-button compact-button" type="button">清除圖片</button>
                <button id="cancelCustomEditBtn" class="ghost-button compact-button" type="button" hidden>取消編輯</button>
                <button id="createCustomCardBtn" class="primary-button" type="button">建立卡牌</button>
              </div>
            </div>
            <div id="customCardList" class="custom-card-list"></div>
          </section>

          <section class="section-band">
            <div class="modifier-toolbar">
              <div>
                <h2>卡牌數值</h2>
                <p>可以調整費用、攻擊、生命、短文字與圖片。留空文字會使用原本敘述。</p>
              </div>
              <div class="field">
                <label for="cardSearch">搜尋卡牌</label>
                <input id="cardSearch" type="search" placeholder="輸入名稱、類型或陣營" />
              </div>
            </div>
            <div id="cardEditorGrid" class="card-editor-grid"></div>
          </section>

          <aside class="section-band">
            <h2>匯入 / 匯出</h2>
            <p>把設定分享給朋友時，可以複製這段 JSON；朋友貼到匯入欄位後按儲存即可。</p>
            <div class="field">
              <label for="exportBox">設定 JSON</label>
              <textarea id="exportBox" class="export-box" spellcheck="false"></textarea>
            </div>
            <div class="button-row">
              <button id="exportBtn" class="primary-button">產生匯出</button>
              <button id="importBtn" class="ghost-button">匯入設定</button>
            </div>
          </aside>
        </div>
      </section>
    </main>
    <script src="script.js?v=single-entry-screen-20260714"></script>
    <script src="modifier.js?v=webp-20260713"></script>
    <script src="pwa.js?v=guide-offline-20260714"></script>
  </body>
</html>
