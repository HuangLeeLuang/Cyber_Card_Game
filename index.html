<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>賽博牌局</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>
    <div id="playReveal" class="play-reveal" hidden aria-live="polite"></div>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">CC</span>
          <div>
            <h1>賽博牌局</h1>
            <p>15 張牌，短局賽博對戰</p>
          </div>
        </div>
        <nav class="view-tabs site-nav" aria-label="主要頁面">
          <button class="tab-button active" data-view="builder">配牌</button>
          <button class="tab-button" data-view="game">對戰</button>
          <a class="tab-link" href="story.html">劇情</a>
          <a class="tab-link" href="modifier.html">修改器</a>
          <a class="tab-link" href="guide.html">攻略</a>
        </nav>
      </header>

      <section id="builderView" class="view active" aria-labelledby="builderTitle">
        <div id="storyBattleBanner" class="story-battle-banner" hidden></div>
        <div class="builder-layout">
          <aside class="panel operator-panel">
            <div class="panel-heading">
              <span id="builderTitle">操盤者</span>
            </div>
            <div id="operatorList" class="operator-list"></div>
            <div id="operatorDetail" class="operator-detail"></div>
            <div class="rule-stack">
              <div><strong>牌組</strong><span>預設 15 張，可調整</span></div>
              <div><strong>同名</strong><span>最多 2 張</span></div>
              <div><strong>奢侈品</strong><span>預設最多 4 張</span></div>
              <div><strong>裝備</strong><span>角色與單位皆可裝備</span></div>
            </div>
            <div class="button-row">
              <button id="quickBuildBtn" class="primary-button">快速配牌</button>
              <button id="clearDeckBtn" class="ghost-button">清空</button>
            </div>
          </aside>

          <section class="panel library-panel" aria-label="卡牌庫">
            <div class="library-toolbar">
              <div class="filter-group" role="group" aria-label="卡牌篩選">
                <button class="filter-button active" data-filter="all">全部</button>
                <button class="filter-button" data-filter="unit">單位</button>
                <button class="filter-button" data-filter="program">程式</button>
                <button class="filter-button" data-filter="mod">改造</button>
                <button class="filter-button" data-filter="luxury">奢侈品</button>
              </div>
              <div class="deck-meter">
                <span id="deckCount">0 / 15</span>
                <div class="meter-track"><span id="deckMeterFill"></span></div>
              </div>
            </div>
            <div id="cardLibrary" class="card-library"></div>
          </section>

          <aside class="panel deck-panel" aria-label="目前牌組">
            <div class="panel-heading">
              <span>目前牌組</span>
              <strong id="luxuryCount">奢侈品 0 / 4</strong>
            </div>
            <div id="deckList" class="deck-list"></div>
            <button id="startGameBtn" class="start-button" disabled>開始對戰</button>
          </aside>
        </div>
      </section>

      <section id="gameView" class="view" aria-label="對戰桌">
        <div class="game-layout">
          <section class="table-panel">
            <div class="combatant-row opponent-row">
              <div id="aiHero" class="hero-card target-node" data-target-kind="hero" data-owner="ai"></div>
              <div class="zone-stack">
                <div id="aiLuxuries" class="luxury-strip"></div>
                <div id="aiBoard" class="board-row"></div>
                <div class="hidden-hand">
                  <span id="aiHandCount">0</span>
                  <span class="card-back-mini"></span>
                </div>
              </div>
            </div>

            <div class="turn-bar">
              <button id="heroSkillBtn" class="skill-button"></button>
              <div id="turnStatus" class="turn-status">尚未開始</div>
              <button id="endTurnBtn" class="end-turn-button">結束回合</button>
            </div>

            <div class="combatant-row player-row">
              <div id="playerHero" class="hero-card target-node" data-target-kind="hero" data-owner="player"></div>
              <div class="zone-stack">
                <div id="playerBoard" class="board-row"></div>
                <div id="playerLuxuries" class="luxury-strip"></div>
                <div id="playerHand" class="hand-row"></div>
              </div>
            </div>
          </section>

          <aside class="panel game-panel">
            <div id="actionPanel" class="action-panel"></div>
            <div class="panel-heading">
              <span>牌局紀錄</span>
            </div>
            <div id="gameLog" class="game-log"></div>
          </aside>
        </div>
      </section>
    </main>
    <div id="storyResult" class="story-result" hidden aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
